spec:
  rules:
    - host: api.multicloud-devops-ninja.pt
      http:
        paths:
          - path: /book
            pathType: Prefix
            backend:
              service:
                name: api-book
                port:
                  number: 80
          - path: /song
            pathType: Prefix
            backend:
              service:
                name: api-song
                port:
                  number: 80
          - path: /video
            pathType: Prefix
            backend:
              service:
                name: api-video
                port:
                  number: 80
