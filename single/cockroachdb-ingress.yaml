
# https://doc.traefik.io/traefik/v3.0/routing/providers/kubernetes-ingress/
---
kind: Ingress
apiVersion: networking.k8s.io/v1
metadata:
  name: cockroachdb
spec:
  ingressClassName: traefik
  rules:
    - host: cockroachdb.rancher
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cockroachdb
                port:
                  number: 8080
