---
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: rke2-traefik
  namespace: kube-system
spec:
  valuesContent: |-
    api:
      dashboard: true
      insecure: false
    service:
          type: NodePort
    ports:
      web:
        nodePort: 30700
      websecure:
        nodePort: 32655
      traefik:
        nodePort: 30900
