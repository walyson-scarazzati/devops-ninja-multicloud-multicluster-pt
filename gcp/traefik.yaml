---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-web-ui
  namespace: kube-system
spec:
  ingressClassName: traefik
  entryPoints:
    - web
  routes:
    - match: Host(`traefik.multicloud-devops-ninja.pt`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))
      kind: Rule
      services:
        - name: api@internal
          kind: TraefikService
